<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Am A Robot</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --primary-color: #3b82f6;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --system-color: #f59e0b;
            --border-color: #334155;
            --player-color: #10b981;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #login-screen, #chat-screen {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background-color: var(--surface-color);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #login-screen {
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        input[type="text"] {
            width: 80%;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        button {
            padding: 1rem 2rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.3s, transform 0.1s;
        }

        .join-btn:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .config-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        
        .config-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .chat-container {
            transform: scale(0.98);
        }

        #chat-screen {
            display: none;
        }

        .chat-header {
            padding: 1rem 1.5rem;
            background-color: rgba(30, 41, 59, 0.9);
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .chat-messages {
            flex-grow: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 80%;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            line-height: 1.4;
            animation: fadeIn 0.3s ease-out;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-system {
            align-self: center;
            background-color: transparent;
            color: var(--system-color);
            font-style: italic;
            text-align: center;
            max-width: 90%;
            border: 1px solid rgba(245, 158, 11, 0.2);
            font-size: 0.95rem;
        }

        .msg-critical {
            align-self: center;
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.15), rgba(239, 68, 68, 0.05));
            color: #f87171;
            border: 2px solid rgba(239, 68, 68, 0.4);
            border-radius: 12px;
            padding: 1.2rem;
            max-width: 90%;
            text-align: center;
            font-weight: 600;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
            font-size: 1.05rem;
            letter-spacing: 0.02em;
            animation: pulse-border 2s infinite, fadeIn 0.3s ease-out;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 5px rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); border-color: rgba(239, 68, 68, 0.8); }
            100% { box-shadow: 0 0 5px rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.4); }
        }

        .msg-chat {
            align-self: flex-start;
            background-color: var(--bg-color);
            border-bottom-left-radius: 2px;
        }

        .msg-sender {
            font-weight: bold;
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .prompt-toggle {
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s, transform 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        .prompt-toggle:hover {
            opacity: 1;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .prompt-toggle.open svg {
            transform: rotate(180deg);
        }

        .prompt-details {
            display: none;
            margin-top: 0.8rem;
            padding: 0.8rem;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            border-left: 2px solid var(--primary-color);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .prompt-details.show {
            display: block;
            animation: fadeIn 0.2s ease-out;
        }

        .prompt-section {
            margin-bottom: 0.5rem;
        }

        .prompt-section strong {
            color: var(--text-primary);
            display: block;
            margin-bottom: 0.2rem;
        }

        .typing-indicator {
            align-self: flex-start;
            padding: 0.5rem 1rem;
            color: var(--text-secondary);
            font-style: italic;
            font-size: 0.9rem;
            display: none;
        }

        .chat-input-container {
            display: flex;
            padding: 1rem;
            background-color: var(--surface-color);
            border-top: 1px solid var(--border-color);
            gap: 0.5rem;
        }

        #chat-input {
            flex-grow: 1;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        #chat-input:focus {
            border-color: var(--primary-color);
        }

        #send-btn {
            padding: 0.75rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        #send-btn:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-box">
            <h1>I Am A Robot</h1>
            <input type="text" id="player-name" class="name-input" placeholder="Enter your name..." autocomplete="off" style="margin-bottom: 1rem;">
            
            <div class="config-group">
                <label for="game-duration">Game Duration (seconds):</label>
                <input type="number" id="game-duration" class="name-input" value="10" min="5" max="300" style="margin-bottom: 0;">
            </div>
            
            <div class="config-group">
                <label for="ai-temperature">AI Temperature (0.0 to 2.0):</label>
                <input type="number" id="ai-temperature" class="name-input" value="1.0" min="0.0" max="2.0" step="0.1" style="margin-bottom: 0;">
            </div>

            <div class="config-group">
                <label for="chat-speed">Chat Speed:</label>
                <select id="chat-speed" style="width: 80%; padding: 1rem; border-radius: 8px; border: 1px solid var(--border-color); background-color: var(--bg-color); color: var(--text-primary); font-size: 1.1rem; outline: none; margin-bottom: 0;">
                    <option value="super_slow">Super Slow (90-160s delay)</option>
                    <option value="slow">Slow (50-90s delay)</option>
                    <option value="medium" selected>Medium (25-50s delay)</option>
                    <option value="fast">Fast (12-25s delay)</option>
                </select>
            </div>

            <button class="join-btn" id="start-btn">Join Game</button>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chat-screen">
        <div class="chat-header">
            <span>Room: <span id="room-name">Main</span></span>
            <span id="player-display"></span>
        </div>
        <div class="chat-messages" id="chat-messages">
            <!-- Messages go here -->
        </div>
        <div class="typing-indicator" id="typing-indicator">AIs are typing...</div>
        <div class="chat-input-container">
            <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        const loginScreen = document.getElementById('login-screen');
        const chatScreen = document.getElementById('chat-screen');
        const startBtn = document.getElementById('start-btn');
        const chatMessages = document.getElementById('chat-messages');
        const typingIndicator = document.getElementById('typing-indicator');
        
        let ws;

        startBtn.addEventListener('click', startGame);

        function startGame() {
            const nameInput = document.getElementById('player-name');
            const durationInput = document.getElementById('game-duration');
            const tempInput = document.getElementById('ai-temperature');
            const speedInput = document.getElementById('chat-speed');
            
            const playerName = nameInput.value.trim();
            const duration = parseInt(durationInput.value) || 10;
            const temperature = parseFloat(tempInput.value) || 1.0;
            const speed = speedInput.value;
            
            if (!playerName) {
                alert("Please enter a name");
                return;
            }

            // Hide login, show chat
            loginScreen.style.display = 'none';
            chatScreen.style.display = 'flex';
            document.getElementById('player-display').textContent = playerName;

            // Connect WebSocket with query parameters
            const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
            const wsUrl = `${protocol}//${window.location.host}/ws/${encodeURIComponent(playerName)}?duration=${duration}&temperature=${temperature}&speed=${speed}`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                addMessage('system', 'Connected to the game server. Waiting for game to start...');
                typingIndicator.style.display = 'block';
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === 'system') {
                    addMessage('system', data.content, data.meta);
                } else if (data.type === 'critical') {
                    addMessage('critical', data.content, data.meta);
                } else if (data.type === 'chat') {
                    // Extract sender from "name: content" format
                    const splitIdx = data.content.indexOf(':');
                    if (splitIdx > -1) {
                        const sender = data.content.substring(0, splitIdx);
                        const msg = data.content.substring(splitIdx + 1).trim();
                        addChatMessage(sender, msg, data.meta);
                    } else {
                        addChatMessage('unknown', data.content, data.meta);
                    }
                }
                
                // If we get a "survived" or "lose" message, hide typing indicator
                if (data.content.includes("You win") || data.content.includes("You lose")) {
                    typingIndicator.style.display = 'none';
                }
            };

            ws.onclose = () => {
                addMessage('system', 'Connection to server lost. Game over.');
                typingIndicator.style.display = 'none';
            };
        }

        function buildPromptDetails(meta) {
            if (!meta || (!meta.system_prompt && !meta.user_prompt)) return null;
            
            const toggleBtn = document.createElement('div');
            toggleBtn.className = 'prompt-toggle';
            toggleBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>';
            
            const detailsDiv = document.createElement('div');
            detailsDiv.className = 'prompt-details';
            
            if (meta.system_prompt) {
                const sysDiv = document.createElement('div');
                sysDiv.className = 'prompt-section';
                sysDiv.innerHTML = `<strong>System Prompt:</strong> ${meta.system_prompt.replace(/\n/g, '<br>')}`;
                detailsDiv.appendChild(sysDiv);
            }
            if (meta.user_prompt) {
                const userDiv = document.createElement('div');
                userDiv.className = 'prompt-section';
                userDiv.innerHTML = `<strong>User Prompt:</strong> ${meta.user_prompt.replace(/\n/g, '<br>')}`;
                detailsDiv.appendChild(userDiv);
            }
            
            toggleBtn.addEventListener('click', () => {
                detailsDiv.classList.toggle('show');
                toggleBtn.classList.toggle('open');
            });
            
            return { toggleBtn, detailsDiv };
        }

        function addMessage(type, content, meta = null) {
            const div = document.createElement('div');
            div.className = `message msg-${type}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.innerHTML = content.replace(/\n/g, '<br>');
            div.appendChild(contentDiv);
            
            const promptUI = buildPromptDetails(meta);
            if (promptUI) {
                const headerDiv = document.createElement('div');
                headerDiv.className = 'msg-sender';
                headerDiv.style.justifyContent = 'flex-end';
                headerDiv.appendChild(promptUI.toggleBtn);
                div.insertBefore(headerDiv, contentDiv);
                div.appendChild(promptUI.detailsDiv);
            }
            
            // Insert into the chat messages container
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addChatMessage(sender, content, meta = null) {
            const div = document.createElement('div');
            div.className = 'message msg-chat';
            
            const playerName = document.getElementById('player-name').value.trim();
            if (sender.toLowerCase() === playerName.toLowerCase()) {
                div.style.alignSelf = 'flex-end';
                div.style.backgroundColor = 'var(--primary-color)';
                div.style.borderBottomRightRadius = '2px';
                div.style.borderBottomLeftRadius = '12px';
            } else {
                div.style.alignSelf = 'flex-start';
                div.style.backgroundColor = 'var(--bg-color)';
                div.style.borderBottomLeftRadius = '2px';
            }
            
            const senderDiv = document.createElement('div');
            senderDiv.className = 'msg-sender';
            
            const nameSpan = document.createElement('span');
            nameSpan.textContent = sender;
            senderDiv.appendChild(nameSpan);
            
            const contentDiv = document.createElement('div');
            contentDiv.textContent = content; // safer than innerHTML for chat
            
            const promptUI = buildPromptDetails(meta);
            if (promptUI) {
                senderDiv.appendChild(promptUI.toggleBtn);
            }
            
            div.appendChild(senderDiv);
            div.appendChild(contentDiv);
            
            if (promptUI) {
                div.appendChild(promptUI.detailsDiv);
            }
            
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Send message event listeners
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');

        function sendMessage() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            const text = chatInput.value.trim();
            if (!text) return;
            
            ws.send(JSON.stringify({ type: 'chat', content: text }));
            chatInput.value = '';
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
